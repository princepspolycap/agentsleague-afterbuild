<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometric Dungeon Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg: #050810;
            --panel: #0b1326;
            --line: #1b2742;
            --teal: #2dd4bf;
            --amber: #fbbf24;
            --rose: #fb7185;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(700px 360px at 20% -10%, rgba(45, 212, 191, 0.18), transparent 60%),
                linear-gradient(180deg, #050810 0%, #02040a 100%);
            color: #e2e8f0;
            font-family: 'Share Tech Mono', monospace;
        }

        .panel {
            background: rgba(11, 19, 38, 0.86);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 14px 40px -26px rgba(45, 212, 191, 0.45);
        }

        .btn {
            border: 1px solid #24566a;
            background: rgba(13, 148, 136, 0.16);
            color: #ccfbf1;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
            transition: 120ms ease;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--teal);
            background: rgba(13, 148, 136, 0.26);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-danger {
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
            color: #fecdd3;
        }

        .artifact-pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #070d19;
            border: 1px solid #1f2a44;
            border-radius: 6px;
            padding: 8px;
            color: #dbeafe;
        }
    </style>
</head>
<body>
    <main class="min-h-screen p-4 lg:p-6 grid grid-cols-1 xl:grid-cols-[1fr_380px] gap-4">
        <section class="panel p-3">
            <div class="flex items-center justify-between gap-3 mb-3">
                <div>
                    <div class="text-[11px] uppercase tracking-[0.22em] text-teal-300">Phaser Geometric Prototype</div>
                    <h1 class="text-xl font-bold text-white">Your Company Is The Dungeon</h1>
                </div>
                <a href="/sprites" class="text-xs text-slate-400 hover:text-teal-300">Old canvas</a>
            </div>
            <div id="geometric-canvas" class="w-full overflow-hidden rounded border border-[#1b2742] bg-[#04070f]"></div>
            <div class="mt-2 text-xs text-slate-400">
                Move with WASD/arrows. Press E near the active agent. Autoplay uses the same route and gate flow.
            </div>
        </section>

        <aside class="panel p-4 flex flex-col gap-4 min-h-[720px]">
            <section>
                <label class="block text-[11px] uppercase tracking-[0.18em] text-slate-400 mb-1">Company</label>
                <input id="geo-company" value="QuestForge Ltd." class="w-full bg-[#060b15] border border-[#1f2a44] rounded px-3 py-2 text-sm outline-none focus:border-teal-400" />
            </section>
            <section>
                <label class="block text-[11px] uppercase tracking-[0.18em] text-slate-400 mb-1">Pitch</label>
                <textarea id="geo-pitch" rows="4" class="w-full bg-[#060b15] border border-[#1f2a44] rounded px-3 py-2 text-sm outline-none focus:border-teal-400">A solo founder tool that turns a rough startup idea into positioning, landing page copy, and a launch campaign.</textarea>
            </section>

            <div class="grid grid-cols-2 gap-2">
                <button id="geo-start" class="btn">Start Quest</button>
                <button id="geo-autoplay" class="btn">Autoplay</button>
                <button id="geo-run" class="btn" disabled>Run Agent</button>
                <button id="geo-approve" class="btn" disabled>Approve</button>
                <button id="geo-reject" class="btn btn-danger" disabled>Reject</button>
                <button id="geo-reset" class="btn btn-danger">Reset</button>
            </div>

            <section>
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm uppercase tracking-[0.16em] text-teal-300">Run State</h2>
                    <span id="geo-status" class="text-xs text-slate-400">Idle</span>
                </div>
                <div id="geo-quest" class="grid grid-cols-3 gap-2"></div>
            </section>

            <section class="flex-1 min-h-0 flex flex-col">
                <h2 class="text-sm uppercase tracking-[0.16em] text-teal-300 mb-2">Artifact</h2>
                <div id="geo-artifact" class="flex-1 overflow-auto text-xs text-slate-300">
                    Start a quest to generate artifacts.
                </div>
            </section>

            <section>
                <h2 class="text-sm uppercase tracking-[0.16em] text-teal-300 mb-2">Trace</h2>
                <div id="geo-log" class="h-36 overflow-auto text-xs text-slate-400 bg-[#050914] border border-[#1f2a44] rounded p-2"></div>
            </section>
        </aside>
    </main>

    <script src="/game/game/geometric_canvas.js?v=1"></script>
</body>
</html>
